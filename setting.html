<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>設定</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        input {
            margin: 10px 0;
            padding: 8px;
        }

        button {
            padding: 8px 15px;
        }
    </style>
</head>
<body>

    <h2>設定</h2>

    <div id="userInfo"></div>

    <h3>背景色を変更</h3>
    <input type="color" id="bgColor">
    <button id="saveBtn">保存</button>
    <div id="msg"></div>

    <button onclick="location.href='mypage.html'">マイページへ戻る</button>

    <script>const API_URL = "https://script.google.com/macros/s/AKfycbzGlBULbnFOjgktgaAXLdvtCrSokfeLoD_ToU8M7xnwgKduEkFng6Eqs-tRQ7h-JmCiLw/exec";

  // ログインチェック
  const user = JSON.parse(sessionStorage.getItem("loginUser"));
  if (!user) location.href = "index.html";

  document.getElementById("userInfo").innerHTML = `
    <p><strong>${user.name}</strong> さん</p>
    <p>ID：${user.id}</p>
  `;

  // 現在の背景色を初期値に
  document.getElementById("bgColor").value = user.bgColor || "#ffffff";

  // 保存処理
  document.getElementById("saveBtn").addEventListener("click", () => {
    const color = document.getElementById("bgColor").value;

    fetch(API_URL, {
      method: "POST",
      body: new URLSearchParams({
        action: "saveUserSetting",
        id: user.id,
        bgcolor: color
      })
    })
      .then(res => res.json())
      .then(result => {
        if (result.ok) {
          user.bgColor = color;
          sessionStorage.setItem("loginUser", JSON.stringify(user));
          document.getElementById("msg").textContent = "保存しました！";
        } else {
          document.getElementById("msg").textContent = result.message;
        }
      });
  });</script>

</body>
</html>
