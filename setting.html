<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>返却ボックス</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 8px 15px;
        }
    </style>
</head>
<body>

    <h2>返却ボックス（ユーザー → 管理者）</h2>

    <div id="userInfo"></div>

    <h3>ファイルを送信</h3>
    <input type="file" id="fileInput">
    <button id="uploadBtn">送信</button>
    <div id="uploadMsg"></div>

    <h3>送信履歴</h3>
    <div id="history"></div>

    <button onclick="location.href='mypage.html'">マイページへ戻る</button>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzXdgO7mtCajSvAyDdUO0nKshl_8rhJziCIM8oVsjgVDu0v3hJ2MHARo-c-BYyq6U3jig/exec";

        // ★ Cloudinary の設定（あなたの値に書き換えてね）
        const CLOUD_NAME = "your_cloud_name";
        const UPLOAD_PRESET = "your_upload_preset";

        // ログインチェック
        const user = JSON.parse(sessionStorage.getItem("loginUser"));
        if (!user) location.href = "index.html";

        document.getElementById("userInfo").innerHTML = `
        <p><strong>${user.name}</strong> さん</p>
        <p>ID：${user.id}</p>
      `;

        // Cloudinary アップロード → GAS 保存
        document.getElementById("uploadBtn").addEventListener("click", async () => {
            const file = document.getElementById("fileInput").files[0];
            const msg = document.getElementById("uploadMsg");

            if (!file) {
                msg.textContent = "ファイルを選択してください。";
                return;
            }

            msg.textContent = "アップロード中…";

            // Cloudinary へアップロード
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                method: "POST",
                body: formData
            });

            const json = await res.json();
            const fileUrl = json.secure_url;

            // GAS に保存
            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "saveReturnBox",
                    id: user.id,
                    fileUrl: fileUrl
                })
            })
                .then(res => res.json())
                .then(() => {
                    msg.textContent = "送信しました！";
                    loadHistory();
                });
        });

        // 履歴読み込み
        function loadHistory() {
            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "getReturnBox",
                    id: user.id
                })
            })
                .then(res => res.json())
                .then(list => {
                    const area = document.getElementById("history");
                    area.innerHTML = "";

                    list.forEach(item => {
                        const div = document.createElement("div");
                        div.className = "box";
                        div.innerHTML = `
                <strong>送信ファイル：</strong>
                <a href="${item.user_to_admin}" target="_blank">ファイルを見る</a><br>
                <strong>管理者からの返却：</strong>
                ${item.admin_to_user ? `<a href="${item.admin_to_user}" target="_blank">返却ファイル</a>` : "まだありません"}<br>
                <small>${item.updated_at}</small>
              `;
                        area.appendChild(div);
                    });
                });
        }

        loadHistory();
    </script>

</body>
</html>
