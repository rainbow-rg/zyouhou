<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 15px;
        }

        .msg {
            margin-top: 10px;
            color: red;
        }
    </style>
</head>
<body>

    <h2>ログイン</h2>

    <input id="loginId" placeholder="ID">
    <input id="loginPass" type="password" placeholder="パスワード">

    <button id="loginBtn">ログイン</button>

    <div class="msg" id="loginMsg"></div>

    <p><a href="register.html">新規登録はこちら</a></p>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwAiez7OoqLL6Gl0MaJeWT2s92HWOXgou88i5FOoLK6ic8HcNrc2-8z23kU_8N-D5M-mw/exec";

        document.getElementById("loginBtn").addEventListener("click", () => {
            const id = document.getElementById("loginId").value;
            const pass = document.getElementById("loginPass").value;
            const msg = document.getElementById("loginMsg");

            msg.textContent = "ログイン中…";

            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "login",
                    id: id,
                    pass: pass
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (!data.ok) {
                        msg.textContent = data.message;
                        return;
                    }

                    sessionStorage.setItem("loginUser", JSON.stringify(data));

                    if (data.role === "admin") {
                        location.href = "kanrimypage.html";
                    } else {
                        location.href = "mypage.html";
                    }
                })
                .catch(() => {
                    msg.textContent = "通信エラーが発生しました。";
                });
        });
    </script>

</body>
</html>
