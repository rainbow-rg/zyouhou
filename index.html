<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <style>
        body {
            font-family: sans-serif;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-container {
            background: white;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 340px;
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 12px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        #loginBtn {
            display: block;
            margin: 0 auto;
            padding: 12px 32px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

            #loginBtn:hover {
                background: #3b7ac4;
            }

        a {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #4a90e2;
            text-decoration: none;
        }

            a:hover {
                text-decoration: underline;
            }

        .msg {
            text-align: center;
            margin-top: 10px;
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>ログイン</h2>

        <input id="id" placeholder="ユーザーID">
        <input id="pass" type="password" placeholder="パスワード">

        <button id="loginBtn">ログイン</button>

        <div id="msg" class="msg"></div>

        <a href="register.html">新規登録はこちら</a>
    </div>

    <script>
        const API_URL ="https://script.google.com/macros/s/AKfycbxjhCAmP1wXOfDbcRcPLsQEK0RJdwpz_peyAIkQHGFxSz_rDj9NQNcsuM8b_NqkHf1ebw/exec";

        document.getElementById("loginBtn").addEventListener("click", () => {
            const id = document.getElementById("id").value;
            const pass = document.getElementById("pass").value;
            const msg = document.getElementById("msg");

            msg.textContent = "";

            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "login",
                    id: id,
                    pass: pass
                })
            })
                .then(res => res.json())
                .then(result => {
                    if (result.ok) {
                        sessionStorage.setItem("loginUser", JSON.stringify(result));
                        if (result.role === "admin") {
                            location.href = "kanrimypage.html";
                        } else {
                            location.href = "mypage.html";
                        }
                    } else {
                        msg.textContent = result.message;
                    }
                });
        });
    </script>

</body>
</html>
