<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ブログ返信</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            border: 1px solid #ccc;
            padding: 15px;
            border-radius: 6px;
            background: #fafafa;
            margin-bottom: 20px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 10px 18px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .msg {
            margin-top: 10px;
            color: green;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>ブログへの返信</h2>

    <div id="blogInfo" class="box"></div>

    <div class="box">
        <h3>返信フォーム</h3>

        <label>返信ファイル：</label>
        <input type="file" id="replyFile">

        <label>コメント：</label>
        <textarea id="replyComment" rows="4"></textarea>

        <button id="sendBtn">送信</button>

        <div id="msg" class="msg"></div>
    </div>

    <button onclick="location.href='mypage.html'">マイページに戻る</button>

    <script>const API_URL = "https://script.google.com/macros/s/AKfycby4-6hhp06yWlhnEHVJVakubswm9_fVFzGiCvRMH2c-SqsBQIZuU1XjEgH6eCAU5q9A9Q/exec";
    const CLOUD_NAME = "dnwfurr5m";
    const UPLOAD_PRESET = "zyouhou";

    // ★ ログイン情報
    const user = JSON.parse(sessionStorage.getItem("loginUser"));
    if (!user) location.href = "index.html";

    // ★ 管理者ページから渡されたブログ番号
    const blogIndex = sessionStorage.getItem("replyBlogIndex");
    if (!blogIndex) {
        alert("ブログ情報がありません");
        location.href = "mypage.html";
    }

    // ★ ブログ内容を取得して表示
    fetch(API_URL, {
        method: "POST",
        body: new URLSearchParams({ action: "getBlogList" })
    })
    .then(res => res.json())
    .then(list => {
        const blog = list.find(b => b.index == blogIndex);
        if (!blog) return;

        document.getElementById("blogInfo").innerHTML = `
            <strong>${blog.title}</strong><br>
            <p>${blog.content}</p>
            <small>${blog.date}</small><br>
            <small>対象：${blog.target === "ALL" ? "全員" : blog.target}</small>
        `;
    });

    // ★ 返信送信
    document.getElementById("sendBtn").addEventListener("click", async () => {
        const file = document.getElementById("replyFile").files[0];
        const comment = document.getElementById("replyComment").value;
        const msg = document.getElementById("msg");

        if (!file && !comment) {
            msg.textContent = "ファイルかコメントを入力してください。";
            return;
        }

        msg.textContent = "送信中…";

        let fileUrl = "";

        // ★ ファイルがある場合は Cloudinary にアップロード
        if (file) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                method: "POST",
                body: formData
            });

            const json = await res.json();
            fileUrl = json.secure_url;
        }

        // ★ GAS に送信（ユーザー → 管理者）
        fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({
                action: "saveReturnBox",
                id: user.id,
                fileUrl: fileUrl,
                comment: comment
            })
        })
        .then(res => res.json())
        .then(() => {
            msg.textContent = "送信しました！";

            setTimeout(() => {
                location.href = "mypage.html";
            }, 1500);
        });
    });</script>

</body>
</html>
