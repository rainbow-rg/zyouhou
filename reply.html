<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>返信フォーム</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .section {
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            height: 120px;
        }

        button {
            padding: 8px 15px;
        }

        .msg {
            margin-top: 10px;
            color: green;
        }
    </style>
</head>
<body>

    <h2>返信フォーム</h2>

    <button onclick="location.href='mypage.html'">マイページへ戻る</button>
    <button onclick="logout()">ログアウト</button>

    <div class="section">
        <h3>返信内容</h3>

        <textarea id="replyContent" placeholder="返信内容を入力してください"></textarea>

        <button id="replyBtn">送信</button>
        <div id="replyMsg" class="msg"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwAiez7OoqLL6Gl0MaJeWT2s92HWOXgou88i5FOoLK6ic8HcNrc2-8z23kU_8N-D5M-mw/exec";

        const user = JSON.parse(sessionStorage.getItem("loginUser"));
        if (!user) location.href = "index.html";

        document.body.style.background = user.bgColor || "#ffffff";

        function logout() {
            sessionStorage.clear();
            location.href = "index.html";
        }

        document.getElementById("replyBtn").addEventListener("click", () => {
            const content = document.getElementById("replyContent").value;
            const msg = document.getElementById("replyMsg");

            if (!content) {
                msg.textContent = "返信内容を入力してください。";
                msg.style.color = "red";
                return;
            }

            msg.textContent = "送信中…";
            msg.style.color = "black";

            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "postBlog",
                    title: "返信",
                    content: content,
                    target: user.id,
                    files: "[]"
                })
            })
                .then(res => res.json())
                .then(() => {
                    msg.textContent = "返信を送信しました！";
                    msg.style.color = "green";
                    document.getElementById("replyContent").value = "";
                })
                .catch(() => {
                    msg.textContent = "通信エラーが発生しました。";
                    msg.style.color = "red";
                });
        });
    </script>

</body>
</html>
