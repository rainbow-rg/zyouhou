<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>管理者ページ</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            border: 1px solid #ccc;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>管理者ページ</h2>

    <button onclick="location.href='?page=index'">ログアウト</button>

    <div class="box">
        <h3>ブログ投稿</h3>
        <input id="blogTitle" placeholder="タイトル"><br><br>
        <textarea id="blogContent" placeholder="内容" rows="5" cols="40"></textarea><br><br>
        <button id="postBlogBtn">投稿</button>
        <div id="blogMsg"></div>
    </div>

    <div class="box">
        <h3>ユーザーの返却ファイル一覧</h3>
        <div id="returnList"></div>
    </div>

    <div class="box">
        <h3>ユーザーへ返却ファイルを送信</h3>

        <label>送り先ユーザー：</label>
        <select id="userSelect"></select><br><br>

        <input type="file" id="adminFileInput">
        <button id="adminUploadBtn">送信</button>
        <div id="adminUploadMsg"></div>
    </div>
    <div class="box">
        <h3>ユーザーへ返却ファイルを送信</h3>

        <label>送り先ユーザー：</label>
        <select id="userSelect"></select><br><br>

        <input type="file" id="adminFileInput">
        <button id="adminUploadBtn">送信</button>
        <div id="adminUploadMsg"></div>
    </div>

    <script>
  const user = JSON.parse(sessionStorage.getItem("loginUser"));
  if (!user || user.role !== "admin") {
    location.href = "?page=index";
  }

  const CLOUD_NAME = "dnwfurr5m";
  const UPLOAD_PRESET = "zyouhou";

  // ブログ投稿
  document.getElementById("postBlogBtn").addEventListener("click", () => {
    const title = document.getElementById("blogTitle").value;
    const content = document.getElementById("blogContent").value;

    google.script.run
      .withSuccessHandler(() => {
        document.getElementById("blogMsg").textContent = "投稿しました！";
      })
      .postBlog(title, content);
  });

  // ユーザー一覧を取得
  google.script.run
    .withSuccessHandler(list => {
      const select = document.getElementById("userSelect");
      list.forEach(u => {
        const opt = document.createElement("option");
        opt.value = u.id;
        opt.textContent = `${u.id} (${u.name})`;
        select.appendChild(opt);
      });
    })
    .getUserList();

  // 管理者 → ユーザー返却ファイル送信
  document.getElementById("adminUploadBtn").addEventListener("click", async () => {
    const file = document.getElementById("adminFileInput").files[0];
    const userId = document.getElementById("userSelect").value;
    const msg = document.getElementById("adminUploadMsg");

    if (!file) {
      msg.textContent = "ファイルを選択してください。";
      return;
    }

    msg.textContent = "アップロード中…";

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);

    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
      method: "POST",
      body: formData
    });

    const json = await res.json();
    const fileUrl = json.secure_url;

    google.script.run
      .withSuccessHandler(() => {
        msg.textContent = "送信しました！";
      })
      .adminReturnFile(userId, fileUrl);
  });
  // 返却ファイル一覧を取得して表示
google.script.run
  .withSuccessHandler(list => {
    const area = document.getElementById("returnList");

    list.forEach(item => {
      const div = document.createElement("div");
      div.className = "box";
      div.innerHTML = `
        <strong>ユーザーID：</strong> ${item.user_id}<br>
        <strong>ユーザー → 管理者：</strong>
          ${item.user_to_admin ? `<a href="${item.user_to_admin}" target="_blank">ファイルを見る</a>` : "なし"}<br>
        <strong>管理者 → ユーザー：</strong>
          ${item.admin_to_user ? `<a href="${item.admin_to_user}" target="_blank">返却ファイル</a>` : "未返却"}<br>
        <strong>更新日時：</strong> ${item.updated_at}
      `;
      area.appendChild(div);
    });
  })
  .getReturnList();
  google.script.run
  .withSuccessHandler(list => {
    const select = document.getElementById("userSelect");
    list.forEach(u => {
      const opt = document.createElement("option");
      opt.value = u.id;
      opt.textContent = `${u.id} (${u.name})`;
      select.appendChild(opt);
    });
  })
  .getUserList();
    </script>

</body>
</html>
