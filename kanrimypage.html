<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者ページ</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .section {
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 8px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
        }

        th {
            background: #eee;
        }

        button {
            padding: 6px 12px;
            margin: 3px;
        }

        .msg {
            margin-top: 10px;
            color: green;
        }
    </style>
</head>
<body>

    <h2>管理者ページ</h2>

    <button onclick="logout()">ログアウト</button>

    <hr>

    <div class="section">
        <h3>ユーザー一覧</h3>
        <div id="userList"></div>
    </div>

    <div class="section">
        <h3>返却履歴</h3>
        <div id="historyList"></div>
    </div>

    <div class="section">
        <h3>返却ファイル送信（管理者 → ユーザー）</h3>

        <label>対象ユーザー：</label>
        <select id="targetUser"></select>

        <br><br>

        <input type="file" id="adminFile">
        <input type="text" id="adminFilename" placeholder="ファイル名（任意）">

        <button id="adminSendBtn">送信</button>
        <div id="adminSendMsg" class="msg"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwAiez7OoqLL6Gl0MaJeWT2s92HWOXgou88i5FOoLK6ic8HcNrc2-8z23kU_8N-D5M-mw/exec";

        const user = JSON.parse(sessionStorage.getItem("loginUser"));
        if (!user || user.role !== "admin") location.href = "index.html";

        function logout() {
            sessionStorage.clear();
            location.href = "index.html";
        }

        /* ▼▼▼ Part 2：ユーザー一覧・返却履歴の読み込み ▼▼▼ */

        // ===============================
        // ユーザー一覧の読み込み
        // ===============================
        function loadUserList() {
            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({ action: "getUserList" })
            })
                .then(res => res.json())
                .then(list => {
                    const area = document.getElementById("userList");
                    const select = document.getElementById("targetUser");

                    area.innerHTML = "";
                    select.innerHTML = "";

                    // 「ALL」を追加
                    const optAll = document.createElement("option");
                    optAll.value = "ALL";
                    optAll.textContent = "全員に送信";
                    select.appendChild(optAll);

                    if (!list || list.length === 0) {
                        area.textContent = "ユーザーがいません。";
                        return;
                    }

                    let html = "<table><tr><th>ID</th><th>名前</th><th>メール</th></tr>";

                    list.forEach(u => {
                        html += `
                            <tr>
                                <td>${u.id}</td>
                                <td>${u.name}</td>
                                <td>${u.mail}</td>
                            </tr>
                        `;

                        const opt = document.createElement("option");
                        opt.value = u.id;
                        opt.textContent = `${u.name}（${u.id}）`;
                        select.appendChild(opt);
                    });

                    html += "</table>";
                    area.innerHTML = html;
                });
        }

        // ===============================
        // 返却履歴の読み込み
        // ===============================
        function loadHistory() {
            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({ action: "getReturnHistory" })
            })
                .then(res => res.json())
                .then(list => {
                    const area = document.getElementById("historyList");
                    area.innerHTML = "";

                    if (!list || list.length === 0) {
                        area.textContent = "返却履歴がありません。";
                        return;
                    }

                    let html = `
                        <table>
                            <tr>
                                <th>日時</th>
                                <th>送信者</th>
                                <th>受信者</th>
                                <th>ファイル</th>
                                <th>コメント</th>
                                <th>削除</th>
                            </tr>
                    `;

                    list.forEach(item => {
                        const fileLink = item.file_url
                            ? `<a href="${item.file_url}" target="_blank">📎 ファイル</a>`
                            : "なし";

                        html += `
                            <tr>
                                <td>${item.time}</td>
                                <td>${item.sender}</td>
                                <td>${item.receiver}</td>
                                <td>${fileLink}</td>
                                <td>${item.comment || ""}</td>
                                <td>
                                    <button onclick="deleteHistory(${item.rowIndex}, '${item.public_id}')">
                                        削除
                                    </button>
                                </td>
                            </tr>
                        `;
                    });

                    html += "</table>";
                    area.innerHTML = html;
                });
        }
// ===============================
// 管理者 → ユーザー返却送信
// ===============================
document.getElementById("adminSendBtn").addEventListener("click", async () => {
        const target = document.getElementById("targetUser").value;
                const file = document.getElementById("adminFile").files[0];
                const filename = document.getElementById("adminFilename").value;
                const msg = document.getElementById("adminSendMsg");

                if (!file) {
                    msg.textContent = "ファイルを選択してください。";
                msg.style.color = "red";
                return;
        }

                msg.textContent = "アップロード中…";
                msg.style.color = "black";

                // Cloudinary 設定
                const CLOUD_NAME = "dnwfurr5m";
                const UPLOAD_PRESET = "zyouhou";

                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", UPLOAD_PRESET);

                // Cloudinary アップロード
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                    method: "POST",
                body: formData
        });
                const json = await res.json();

                const fileUrl = fixPdfUrl(json.secure_url);
                const publicId = json.public_id;

                // GAS へ送信
                fetch(API_URL, {
                    method: "POST",
                body: new URLSearchParams({
                    action: "adminReturnFile",
                userId: target,
                fileUrl: fileUrl,
                publicId: publicId,
                filename: filename,
                senderId: user.id,
                replyToUUID: ""
            })
        })
            .then(res => res.json())
            .then(() => {
                    msg.textContent = "送信しました！";
                msg.style.color = "green";

                document.getElementById("adminFile").value = "";
                document.getElementById("adminFilename").value = "";

                loadHistory();
            });
});

                // PDF の URL 修正（raw 化）
                function fixPdfUrl(url) {
        if (!url.toLowerCase().endsWith(".pdf")) return url;
                return url.replace(/\/image\/upload\/[^/]*\//, "/raw/upload/");
}

                // ===============================
                // 返却履歴の削除
                // ===============================
                function deleteHistory(rowIndex, publicId) {
        if (!confirm("本当に削除しますか？")) return;

                fetch(API_URL, {
                    method: "POST",
                body: new URLSearchParams({
                    action: "deleteReturnFile",
                rowIndex: rowIndex,
                publicId: publicId
            })
        })
            .then(res => res.json())
            .then(() => {
                    loadHistory();
            });
}

                // ===============================
                // 初期ロード
                // ===============================
                loadUserList();
                loadHistory();
    </script>

</body>
</html>
