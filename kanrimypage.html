<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者ページ</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
        }

        input, textarea, select {
            margin: 5px 0;
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>管理者ページ</h2>

    <div id="adminInfo"></div>

    <hr>

    <h3>ブログ投稿</h3>
    <div class="box">
        <input id="blogTitle" placeholder="タイトル">
        <textarea id="blogContent" rows="4" placeholder="内容"></textarea>
        <button id="postBlogBtn">投稿</button>
        <div id="blogMsg"></div>
    </div>

    <hr>

    <h3>ユーザー一覧</h3>
    <div id="userList"></div>

    <hr>

    <h3>返却ファイル一覧（ユーザー → 管理者）</h3>
    <div id="returnList"></div>

    <hr>

    <h3>管理者 → ユーザーへ返却ファイル送信</h3>
    <div class="box">
        <label>送り先ユーザー：</label>
        <select id="userSelect"></select><br>

        <input type="file" id="adminFileInput">
        <button id="adminUploadBtn">送信</button>
        <div id="adminUploadMsg"></div>
    </div>

    <button onclick="location.href='index.html'">ログアウト</button>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwX-oXvb8D1lBNxSET_UdwCD-6yBXxKYrRFAaRnPas5Rsod7j1wni2QmYBSD-d3Ixuy6Q/exec";

        // ★ Cloudinary の設定（あなたの値に書き換えてね）
        const CLOUD_NAME = "dnwfurr5m";
        const UPLOAD_PRESET = "zyouhou";

        // 管理者ログインチェック
        const admin = JSON.parse(sessionStorage.getItem("loginUser"));
        if (!admin || admin.id !== "admin") {
            alert("管理者のみアクセスできます");
            location.href = "index.html";
        }

        document.getElementById("adminInfo").innerHTML = `
        <p>管理者：<strong>${admin.name}</strong></p>
      `;

        // ブログ投稿
        document.getElementById("postBlogBtn").addEventListener("click", () => {
            const title = document.getElementById("blogTitle").value;
            const content = document.getElementById("blogContent").value;

            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "postBlog",
                    title: title,
                    content: content
                })
            })
                .then(res => res.json())
                .then(() => {
                    document.getElementById("blogMsg").textContent = "投稿しました！";
                });
        });

        // ユーザー一覧取得
        fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({ action: "getUserList" })
        })
            .then(res => res.json())
            .then(list => {
                const area = document.getElementById("userList");
                const select = document.getElementById("userSelect");

                list.forEach(u => {
                    const div = document.createElement("div");
                    div.className = "box";
                    div.innerHTML = `
              <strong>ID：</strong> ${u.id}<br>
              <strong>名前：</strong> ${u.name}<br>
              <strong>メール：</strong> ${u.mail}
            `;
                    area.appendChild(div);

                    const opt = document.createElement("option");
                    opt.value = u.id;
                    opt.textContent = `${u.id} (${u.name})`;
                    select.appendChild(opt);
                });
            });

        // 返却ファイル一覧取得
        fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({ action: "getReturnList" })
        })
            .then(res => res.json())
            .then(list => {
                const area = document.getElementById("returnList");

                list.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "box";
                    div.innerHTML = `
              <strong>ユーザーID：</strong> ${item.user_id}<br>
              <strong>ユーザー → 管理者：</strong>
              ${item.user_to_admin ? `<a href="${item.user_to_admin}" target="_blank">ファイルを見る</a>` : "なし"}<br>
              <strong>管理者 → ユーザー：</strong>
              ${item.admin_to_user ? `<a href="${item.admin_to_user}" target="_blank">返却ファイル</a>` : "未返却"}<br>
              <small>${item.updated_at}</small>
            `;
                    area.appendChild(div);
                });
            });

        // 管理者 → ユーザー返却ファイル送信
        document.getElementById("adminUploadBtn").addEventListener("click", async () => {
            const file = document.getElementById("adminFileInput").files[0];
            const userId = document.getElementById("userSelect").value;
            const msg = document.getElementById("adminUploadMsg");

            if (!file) {
                msg.textContent = "ファイルを選択してください。";
                return;
            }

            msg.textContent = "アップロード中…";

            // Cloudinary アップロード
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                method: "POST",
                body: formData
            });

            const json = await res.json();
            const fileUrl = json.secure_url;

            // GAS に保存
            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "adminReturnFile",
                    userId: userId,
                    fileUrl: fileUrl
                })
            })
                .then(res => res.json())
                .then(() => {
                    msg.textContent = "送信しました！";
                });
        });
    </script>

</body>
</html>
