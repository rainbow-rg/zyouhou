<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理者ページ</title>
    <style>
        body {
            font-family: sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        /* ヘッダー */
        header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            header h1 {
                margin: 0;
                font-size: 20px;
            }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
        }

        /* コンテンツ全体 */
        .container {
            padding: 20px;
        }

        /* セクション */
        .section {
            background: white;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

            .section h2 {
                margin-top: 0;
            }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            padding: 10px 18px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .msg {
            margin-top: 10px;
            color: green;
            font-weight: bold;
        }

        .user-card {
            background: #fafafa;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .blog-item {
            background: #fafafa;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>管理者ページ</h1>
        <div>
            <span id="adminName"></span>
            <button class="logout-btn" onclick="logout()">ログアウト</button>
        </div>
    </header>

    <div class="container">

        <!-- ブログ投稿 -->
        <div class="section">
            <h2>ブログ投稿</h2>

            <input id="blogTitle" placeholder="タイトル">
            <textarea id="blogContent" rows="4" placeholder="内容"></textarea>
            <button id="postBlogBtn">投稿</button>

            <div id="blogMsg" class="msg"></div>

            <h3>投稿記録（最新10件）</h3>
            <div id="blogList"></div>
        </div>

        <!-- ファイル転送 -->
        <div class="section">
            <h2>ファイル転送（管理者 → ユーザー）</h2>

            <label>送信先ユーザー：</label>
            <select id="userSelect"></select>

            <input type="file" id="adminFileInput">
            <button id="adminUploadBtn">送信</button>

            <div id="adminUploadMsg" class="msg"></div>
        </div>

        <!-- ユーザー一覧 -->
        <div class="section">
            <h2>ユーザー一覧</h2>
            <div id="userList"></div>
        </div>

    </div>

    <script>
        const API_URL = "YOUR_GAS_URL";
        const CLOUD_NAME = "dnwfurr5m";
        const UPLOAD_PRESET = "zyouhou";

        /* -------------------------
           管理者チェック
        ------------------------- */
        const admin = JSON.parse(sessionStorage.getItem("loginUser"));
        if (!admin || admin.role !== "admin") {
            alert("管理者のみアクセスできます");
            location.href = "index.html";
        }
        document.getElementById("adminName").textContent = `ID: ${admin.id}`;

        function logout() {
            sessionStorage.clear();
            location.href = "index.html";
        }

        /* -------------------------
           URL をリンク化
        ------------------------- */
        function linkify(text) {
            const urlPattern = /(https?:\/\/[^\s]+)|(www\.[^\s]+)/g;
            return text.replace(urlPattern, function (url) {
                let href = url;
                if (!href.startsWith("http")) href = "http://" + href;
                return `<a href="${href}" target="_blank">${url}</a>`;
            });
        }

        /* -------------------------
           ブログ投稿
        ------------------------- */
        document.getElementById("postBlogBtn").addEventListener("click", () => {
            const title = document.getElementById("blogTitle").value;
            const content = document.getElementById("blogContent").value;

            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "postBlog",
                    title: title,
                    content: content
                })
            })
                .then(res => res.json())
                .then(() => {
                    const msg = document.getElementById("blogMsg");
                    msg.textContent = "投稿しました！";

                    setTimeout(() => msg.textContent = "", 10000);

                    document.getElementById("blogTitle").value = "";
                    document.getElementById("blogContent").value = "";

                    loadBlogList();
                });
        });

        /* -------------------------
           ブログ一覧（最新10件）
        ------------------------- */
        function loadBlogList() {
            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({ action: "getBlogList" })
            })
                .then(res => res.json())
                .then(list => {
                    const area = document.getElementById("blogList");
                    area.innerHTML = "";

                    list.slice(0, 10).forEach(item => {
                        const div = document.createElement("div");
                        div.className = "blog-item";
                        div.innerHTML = `
                        <strong>${item.title}</strong><br>
                        ${linkify(item.content)}<br>
                        <small>${item.date}</small>
                    `;
                        area.appendChild(div);
                    });
                });
        }
        loadBlogList();

        /* -------------------------
           ユーザー一覧
        ------------------------- */
        fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({ action: "getUserList" })
        })
            .then(res => res.json())
            .then(list => {
                const area = document.getElementById("userList");
                const select = document.getElementById("userSelect");

                list.forEach(u => {
                    const div = document.createElement("div");
                    div.className = "user-card";
                    div.innerHTML = `
                    <strong>ID：</strong> ${u.id}<br>
                    <strong>名前：</strong> ${u.name}<br>
                    <strong>メール：</strong> ${u.mail}
                `;
                    area.appendChild(div);

                    const opt = document.createElement("option");
                    opt.value = u.id;
                    opt.textContent = `${u.id} (${u.name})`;
                    select.appendChild(opt);
                });
            });

        /* -------------------------
           管理者 → ユーザー ファイル送信
        ------------------------- */
        document.getElementById("adminUploadBtn").addEventListener("click", async () => {
            const file = document.getElementById("adminFileInput").files[0];
            const userId = document.getElementById("userSelect").value;
            const msg = document.getElementById("adminUploadMsg");

            if (!file) {
                msg.textContent = "ファイルを選択してください。";
                setTimeout(() => msg.textContent = "", 10000);
                return;
            }

            msg.textContent = "アップロード中…";

            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${dnwfurr5m}/upload`, {
                method: "POST",
                body: formData
            });

            const json = await res.json();
            const fileUrl = json.secure_url;

            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "adminReturnFile",
                    userId: userId,
                    fileUrl: fileUrl
                })
            })
                .then(res => res.json())
                .then(() => {
                    msg.textContent = "送信しました！";
                    setTimeout(() => msg.textContent = "", 10000);

                    document.getElementById("adminFileInput").value = "";
                });
        });

    </script>

</body>
</html>
