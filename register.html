<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>新規登録</title>
    <style>
        body {
            font-family: sans-serif;
        }

        .error {
            color: red;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="return"><a href="?page=index">←戻る</a></div>

    <div>氏名<br><input name="name"></div>
    <div>メールアドレス<br><input name="mail"></div>
    <div>ユーザID<br><input name="id" inputmode="numeric"></div>
    <div>パスワード<br><input name="pass" type="password"></div>
    <div>パスワード確認用<br><input name="pass2" type="password"></div>

    <button id="regBtn">登録</button>
    <div id="regError" class="error"></div>

    <script>
    const nameInput = document.querySelector("input[name='name']");
    const mailInput = document.querySelector("input[name='mail']");
    const idInput = document.querySelector("input[name='id']");
    const passInput = document.querySelector("input[name='pass']");
    const pass2Input = document.querySelector("input[name='pass2']");
    const errorBox = document.getElementById('regError');

    document.getElementById('regBtn').addEventListener('click', () => {
      const data = {
        name: nameInput.value.trim(),
        mail: mailInput.value.trim(),
        id: idInput.value.trim(),
        pass: passInput.value,
        pass2: pass2Input.value
      };

      errorBox.textContent = '';

      if (data.pass !== data.pass2) {
        errorBox.textContent = 'パスワードが一致しません';
        return;
      }

      google.script.run
        .withSuccessHandler(result => {
          if (result.ok) {
            alert('登録完了！');
            location.href = '?page=index';
          } else {
            errorBox.textContent = result.message || '登録に失敗しました';
          }
        })
        .registerUser(data);
    });
    </script>
</body>
</html>
