<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規登録</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 15px;
        }
    </style>
</head>
<body>

    <h2>新規登録</h2>

    <input id="name" placeholder="名前">
    <input id="mail" placeholder="メールアドレス">
    <input id="id" placeholder="ユーザーID">
    <input id="pass" type="password" placeholder="パスワード">

    <button id="registerBtn">登録</button>

    <p><a href="index.html">ログインページへ戻る</a></p>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzXdgO7mtCajSvAyDdUO0nKshl_8rhJziCIM8oVsjgVDu0v3hJ2MHARo-c-BYyq6U3jig/exec";

        document.getElementById("registerBtn").addEventListener("click", () => {
            const name = document.getElementById("name").value;
            const mail = document.getElementById("mail").value;
            const id = document.getElementById("id").value;
            const pass = document.getElementById("pass").value;

            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "register",
                    name: name,
                    mail: mail,
                    id: id,
                    pass: pass
                })
            })
                .then(res => res.json())
                .then(result => {
                    if (result.ok) {
                        alert("登録が完了しました！");
                        location.href = "index.html";
                    } else {
                        alert(result.message);
                    }
                });
        });
    </script>

</body>
</html>
