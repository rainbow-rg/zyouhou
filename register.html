<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規登録</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        input {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 250px;
        }

        button {
            padding: 8px 15px;
        }

        .msg {
            margin-top: 10px;
            color: red;
        }
    </style>
</head>
<body>

    <h2>新規登録</h2>

    <input id="regName" placeholder="名前">
    <input id="regMail" placeholder="メールアドレス">
    <input id="regId" placeholder="ID">
    <input id="regPass" type="password" placeholder="パスワード（8文字以上）">

    <button id="regBtn">登録</button>

    <div class="msg" id="regMsg"></div>

    <p><a href="index.html">ログイン画面へ戻る</a></p>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwAiez7OoqLL6Gl0MaJeWT2s92HWOXgou88i5FOoLK6ic8HcNrc2-8z23kU_8N-D5M-mw/exec";

        document.getElementById("regBtn").addEventListener("click", () => {
            const name = document.getElementById("regName").value;
            const mail = document.getElementById("regMail").value;
            const id = document.getElementById("regId").value;
            const pass = document.getElementById("regPass").value;
            const msg = document.getElementById("regMsg");

            msg.textContent = "登録中…";

            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "register",
                    name: name,
                    mail: mail,
                    id: id,
                    pass: pass
                })
            })
                .then(res => res.json())
                .then(data => {
                    if (!data.ok) {
                        msg.textContent = data.message;
                        return;
                    }

                    msg.style.color = "green";
                    msg.textContent = "登録が完了しました！ログインしてください。";

                    setTimeout(() => {
                        location.href = "index.html";
                    }, 1500);
                })
                .catch(() => {
                    msg.textContent = "通信エラーが発生しました。";
                });
        });
    </script>

</body>
</html>
