<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ファイル送信</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .section {
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 8px 15px;
        }

        .msg {
            margin-top: 10px;
            color: green;
        }
    </style>
</head>
<body>

    <h2>管理者への送信</h2>

    <button onclick="location.href='mypage.html'">マイページへ戻る</button>
    <button onclick="logout()">ログアウト</button>

    <div class="section">
        <h3>ファイル送信フォーム</h3>

        <input type="file" id="sendFile">
        <textarea id="sendComment" placeholder="コメント（任意）"></textarea>

        <button id="sendBtn">送信</button>
        <div id="sendMsg" class="msg"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwAiez7OoqLL6Gl0MaJeWT2s92HWOXgou88i5FOoLK6ic8HcNrc2-8z23kU_8N-D5M-mw/exec";

        const user = JSON.parse(sessionStorage.getItem("loginUser"));
        if (!user) location.href = "index.html";

        document.body.style.background = user.bgColor || "#ffffff";

        function logout() {
            sessionStorage.clear();
            location.href = "index.html";
        }

        document.getElementById("sendBtn").addEventListener("click", async () => {
            const file = document.getElementById("sendFile").files[0];
            const comment = document.getElementById("sendComment").value;
            const msg = document.getElementById("sendMsg");

            if (!file) {
                msg.textContent = "ファイルを選択してください。";
                msg.style.color = "red";
                return;
            }

            msg.textContent = "アップロード中…";
            msg.style.color = "black";

            // Cloudinary 設定
            const CLOUD_NAME = "dnwfurr5m";
            const UPLOAD_PRESET = "zyouhou";

            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            // Cloudinary アップロード
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                method: "POST",
                body: formData
            });
            const json = await res.json();

            const fileUrl = fixPdfUrl(json.secure_url);

            // GAS に送信
            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "saveReturnBox",
                    id: user.id,
                    fileUrl: fileUrl,
                    comment: comment
                })
            })
                .then(res => res.json())
                .then(() => {
                    msg.textContent = "送信しました！";
                    msg.style.color = "green";

                    document.getElementById("sendFile").value = "";
                    document.getElementById("sendComment").value = "";
                });
        });

        function fixPdfUrl(url) {
            if (!url.toLowerCase().endsWith(".pdf")) return url;
            return url.replace(/\/image\/upload\/[^/]*\//, "/raw/upload/");
        }
    </script>

</body>
</html>
