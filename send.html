<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>送信ボックス</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            border: 1px solid #ccc;
            padding: 12px;
            margin: 12px 0;
            border-radius: 6px;
            background: #fafafa;
        }

        button {
            padding: 8px 15px;
        }

        .file-link {
            display: block;
            margin: 5px 0;
        }

        .title {
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>送信ボックス</h2>

    <div id="userInfo"></div>

    <h3>ファイルを送信（ユーザー → 管理者）</h3>
    <input type="file" id="fileInput">
    <button id="uploadBtn">送信</button>
    <div id="uploadMsg"></div>

    <h3>送信履歴（返却セット表示）</h3>
    <div id="history"></div>

    <button onclick="location.href='mypage.html'">マイページへ戻る</button>

    <script>
        const API_URL ="https://script.google.com/macros/s/AKfycbxjhCAmP1wXOfDbcRcPLsQEK0RJdwpz_peyAIkQHGFxSz_rDj9NQNcsuM8b_NqkHf1ebw/exec";

        const CLOUD_NAME = "dnwfurr5m";
        const UPLOAD_PRESET = "zyouhou";

        function fixPdfUrl(url) {
            if (!url.toLowerCase().endsWith(".pdf")) return url;
            return url.replace(/\/image\/upload\/[^/]*\//, "/raw/upload/");
        }

        const user = JSON.parse(sessionStorage.getItem("loginUser"));
        if (!user) location.href = "index.html";

        document.getElementById("userInfo").innerHTML = `
                <p><strong>${user.name}</strong> さん</p>
                <p>ID：${user.id}</p>
            `;

        document.getElementById("uploadBtn").addEventListener("click", async () => {
            const file = document.getElementById("fileInput").files[0];
            const msg = document.getElementById("uploadMsg");

            if (!file) {
                msg.textContent = "ファイルを選択してください。";
                return;
            }

            msg.textContent = "アップロード中…";

            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                method: "POST",
                body: formData
            });

            const json = await res.json();
            const fileUrl = fixPdfUrl(json.secure_url);

            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "saveReturnBox",
                    id: user.id,
                    fileUrl: fileUrl
                })
            })
                .then(res => res.json())
                .then(() => {
                    msg.textContent = "送信しました！";
                    document.getElementById("fileInput").value = "";
                    loadHistory();
                });
        });

        function loadHistory() {
            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "getReturnBox",
                    id: user.id
                })
            })
                .then(res => res.json())
                .then(list => {
                    const area = document.getElementById("history");
                    area.innerHTML = "";

                    if (!list || list.length === 0) {
                        area.textContent = "送信履歴はまだありません。";
                        return;
                    }

                    list.forEach(item => {
                        const div = document.createElement("div");
                        div.className = "box";

                        const userFile = item.user_to_admin
                            ? `<a class="file-link" href="${fixPdfUrl(item.user_to_admin)}" target="_blank">📎 あなたの送信ファイル</a>`
                            : "なし";

                        const adminFile = item.admin_to_user
                            ? `<a class="file-link" href="${fixPdfUrl(item.admin_to_user)}" target="_blank">📎 管理者からの返却ファイル</a>`
                            : "（まだ返却されていません）";

                        div.innerHTML = `
                                <div class="title">あなたの送信：</div>
                                ${userFile}
                                <small>${item.updated_at}</small>

                                <div class="title" style="margin-top:10px;">管理者からの返却：</div>
                                ${adminFile}
                                ${item.admin_time ? `<br><small>${item.admin_time}</small>` : ""}
                            `;

                        area.appendChild(div);
                    });
                });
        }

        loadHistory();
    </script>

</body>
</html>
