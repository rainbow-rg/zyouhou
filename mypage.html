<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイページ</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            transition: background 0.3s;
        }

        .blog-box {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>マイページ</h2>

    <div id="userInfo"></div>

    <button onclick="location.href='設定.html'">設定</button>
    <button onclick="location.href='send.html'">送信ボックス</button>
    <button id="logoutBtn">ログアウト</button>
    

    <h3>お知らせ（ブログ）</h3>
    <div id="blogList"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzFiIMyjsSL_6wB0q4Ki368h23seDWZymn1QG8_M4NrWmO0qu9yWlHeAKT2P-HEKCby/exec";

        // ログインチェック
        document.getElementById("loginBtn").addEventListener("click", () => {
            const id = document.getElementById("loginId").value;
            const pass = document.getElementById("loginPass").value;

            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "login",
                    id: id,
                    pass: pass
                })
            })
                .then(res => res.json())
                .then(result => {
                    if (!result.ok) {
                        alert(result.message);
                        return;
                    }

                    // ログイン情報を保存
                    sessionStorage.setItem("loginUser", JSON.stringify(result));

                    // ★ role によって遷移先を変える
                    if (result.role === "admin") {
                        location.href = "kanrimypage.html";
                    } else {
                        location.href = "mypage.html";
                    }
                });
        });

    </script>

</body>
</html>
