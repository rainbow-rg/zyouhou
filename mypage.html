<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイページ</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            transition: background 0.3s;
        }

        .blog-box {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>マイページ</h2>

    <div id="userInfo"></div>

    <button onclick="location.href='設定.html'">設定</button>
    <button onclick="location.href='send.html'">送信ボックス</button>
    <button id="logoutBtn">ログアウト</button>

    <h3>お知らせ（ブログ）</h3>
    <div id="blogList"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzGlBULbnFOjgktgaAXLdvtCrSokfeLoD_ToU8M7xnwgKduEkFng6Eqs-tRQ7h-JmCiLw/exec";

        // ★ ログイン情報を取得
        const user = JSON.parse(sessionStorage.getItem("loginUser"));
        if (!user) {
            location.href = "index.html";
        }

        // ユーザー情報表示
        document.getElementById("userInfo").innerHTML = `
        <p><strong>${user.name}</strong> さん</p>
        <p>ID：${user.id}</p>
    `;

        // 背景色反映
        if (user.bgColor) {
            document.body.style.background = user.bgColor;
        }

        // 管理者なら管理者ページボタンを追加
        if (user.role === "admin") {
            const btn = document.createElement("button");
            btn.textContent = "管理者ページへ";
            btn.onclick = () => location.href = "kanrimypage.html";
            document.body.insertBefore(btn, document.getElementById("logoutBtn"));
        }

        // ブログ一覧取得
        fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({
                action: "getBlogList"
            })
        })
            .then(res => res.json())
            .then(list => {
                const area = document.getElementById("blogList");
                area.innerHTML = "";

                list.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "blog-box";
                    div.innerHTML = `
                    <strong>${item.title}</strong><br>
                    <p>${item.content}</p>
                    <small>${item.date}</small>
                `;
                    area.appendChild(div);
                });
            });

        // ログアウト
        document.getElementById("logoutBtn").addEventListener("click", () => {
            sessionStorage.removeItem("loginUser");
            location.href = "index.html";
        });

    </script>

</body>
</html>
