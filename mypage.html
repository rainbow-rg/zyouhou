<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイページ</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            transition: background 0.3s;
        }

        .blog-box, .return-box {
            border: 1px solid #ccc;
            padding: 12px;
            margin: 12px 0;
            border-radius: 6px;
            background: #fafafa;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
        }

        .file-link {
            display: block;
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <h2>マイページ</h2>

    <div id="userInfo"></div>

    <button onclick="location.href='設定.html'">設定</button>
    <button onclick="location.href='send.html'">送信ボックス</button>
    <button id="logoutBtn">ログアウト</button>

    <h3>お知らせ（ブログ）</h3>
    <div id="blogList"></div>

    <h3>返却ボックス</h3>
    <div id="returnBox"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby4-6hhp06yWlhnEHVJVakubswm9_fVFzGiCvRMH2c-SqsBQIZuU1XjEgH6eCAU5q9A9Q/exec";

        // ★ ログイン情報
        const user = JSON.parse(sessionStorage.getItem("loginUser"));
        if (!user) location.href = "index.html";

        // ユーザー情報
        document.getElementById("userInfo").innerHTML = `
            <p><strong>${user.name}</strong> さん</p>
            <p>ID：${user.id}</p>
        `;

        // 背景色
        if (user.bgColor) {
            document.body.style.background = user.bgColor;
        }

        // 管理者ボタン
        if (user.role === "admin") {
            const btn = document.createElement("button");
            btn.textContent = "管理者ページへ";
            btn.onclick = () => location.href = "kanrimypage.html";
            document.body.insertBefore(btn, document.getElementById("logoutBtn"));
        }

        // ★ URL をリンク化
        function linkify(text) {
            const urlPattern = /(https?:\/\/[^\s]+)|(www\.[^\s]+)/g;
            return text.replace(urlPattern, function (url) {
                let href = url;
                if (!href.startsWith("http")) href = "http://" + href;
                return `<a href="${href}" target="_blank">${url}</a>`;
            });
        }

        // ★ ブログ一覧
        fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({ action: "getBlogList" })
        })
            .then(res => res.json())
            .then(list => {
                const area = document.getElementById("blogList");
                area.innerHTML = "";

                list.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "blog-box";
                    div.innerHTML = `
                    <strong>${item.title}</strong><br>
                    <p>${linkify(item.content)}</p>
                    <small>${item.date}</small><br>
                    <button onclick="replyBlog('${item.index}')">返信する</button>
                `;
                    area.appendChild(div);
                });
            });

        // ★ 返信ページへ
        function replyBlog(index) {
            sessionStorage.setItem("replyBlogIndex", index);
            location.href = "reply.html";
        }

        // ★ 返却ボックス
        fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({
                action: "getReturnBox",
                id: user.id
            })
        })
            .then(res => res.json())
            .then(list => {
                const area = document.getElementById("returnBox");
                area.innerHTML = "";

                list.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "return-box";

                    div.innerHTML = `
                    <strong>送信ファイル：</strong>
                    ${item.user_to_admin ? `<a class="file-link" href="${item.user_to_admin}" target="_blank">開く</a>` : "なし"}<br>

                    <strong>返却ファイル：</strong>
                    ${item.admin_to_user ? `<a class="file-link" href="${item.admin_to_user}" target="_blank">開く</a>` : "なし"}<br>

                    <strong>返信日時：</strong> ${item.updated_at}<br>
                `;

                    area.appendChild(div);
                });
            });

        // ログアウト
        document.getElementById("logoutBtn").addEventListener("click", () => {
            sessionStorage.removeItem("loginUser");
            location.href = "index.html";
        });

    </script>

</body>
</html>
