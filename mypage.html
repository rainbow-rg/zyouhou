<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイページ</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .section {
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            padding: 8px 15px;
        }

        .msg {
            margin-top: 10px;
            color: green;
        }

        .file-item {
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <h2>マイページ</h2>

    <div id="userInfo"></div>

    <button onclick="location.href='setting.html'">設定</button>
    <button onclick="logout()">ログアウト</button>

    <hr>

    <div class="section">
        <h3>管理者への送信</h3>

        <input type="file" id="sendFile">
        <textarea id="sendComment" placeholder="コメント（任意）"></textarea>

        <button id="sendBtn">送信</button>
        <div id="sendMsg" class="msg"></div>
    </div>

    <div class="section">
        <h3>返却状況</h3>
        <div id="returnList"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwAiez7OoqLL6Gl0MaJeWT2s92HWOXgou88i5FOoLK6ic8HcNrc2-8z23kU_8N-D5M-mw/exec";

        const user = JSON.parse(sessionStorage.getItem("loginUser"));
        if (!user) location.href = "index.html";

        document.body.style.background = user.bgColor || "#ffffff";

        document.getElementById("userInfo").innerHTML = `
                <p><strong>${user.name}</strong> さん</p>
                <p>ID：${user.id}</p>
                <p>メール：${user.mail}</p>
            `;

        function logout() {
            sessionStorage.clear();
            location.href = "index.html";
        }

        document.getElementById("sendBtn").addEventListener("click", async () => {
            const file = document.getElementById("sendFile").files[0];
            const comment = document.getElementById("sendComment").value;
            const msg = document.getElementById("sendMsg");

            if (!file) {
                msg.textContent = "ファイルを選択してください。";
                return;
            }

            msg.textContent = "アップロード中…";

            const CLOUD_NAME = "dnwfurr5m";
            const UPLOAD_PRESET = "zyouhou";

            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`, {
                method: "POST",
                body: formData
            });
            const json = await res.json();

            const fileUrl = fixPdfUrl(json.secure_url);

            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "saveReturnBox",
                    id: user.id,
                    fileUrl: fileUrl,
                    comment: comment
                })
            })
                .then(res => res.json())
                .then(() => {
                    msg.textContent = "送信しました！";
                    document.getElementById("sendFile").value = "";
                    document.getElementById("sendComment").value = "";
                    loadReturnList();
                });
        });

        function fixPdfUrl(url) {
            if (!url.toLowerCase().endsWith(".pdf")) return url;
            return url.replace(/\/image\/upload\/[^/]*\//, "/raw/upload/");
        }

        function loadReturnList() {
            fetch(API_URL, {
                method: "POST",
                body: new URLSearchParams({
                    action: "getReturnBox",
                    id: user.id
                })
            })
                .then(res => res.json())
                .then(list => {
                    const area = document.getElementById("returnList");
                    area.innerHTML = "";

                    if (!list || list.length === 0) {
                        area.textContent = "まだ送信履歴がありません。";
                        return;
                    }

                    list.forEach(item => {
                        const div = document.createElement("div");
                        div.className = "file-item";

                        const userFile = item.user_to_admin
                            ? `<a href="${item.user_to_admin}" target="_blank">📎 送信ファイル</a>`
                            : "なし";

                        const adminFile = item.admin_to_user
                            ? `<a href="${item.admin_to_user}" target="_blank">📥 管理者からの返却</a>`
                            : "（返却なし）";

                        div.innerHTML = `
                                <p><strong>送信日時：</strong> ${item.updated_at}</p>
                                <p>${userFile}</p>
                                <p><strong>コメント：</strong> ${item.comment || "なし"}</p>
                                <p>${adminFile}</p>
                                <hr>
                            `;

                        area.appendChild(div);
                    });
                });
        }

        loadReturnList();
    </script>

</body>
</html>
