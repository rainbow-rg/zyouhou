<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイページ</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
            transition: background 0.3s;
        }

        .blog-box, .return-box {
            border: 1px solid #ccc;
            padding: 12px;
            margin: 12px 0;
            border-radius: 6px;
            background: #fafafa;
        }

        button {
            padding: 8px 15px;
            margin-top: 10px;
        }

        .file-link {
            display: block;
            margin: 5px 0;
        }

        .return-title {
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <h2>マイページ</h2>

    <div id="userInfo"></div>

    <button onclick="location.href='設定.html'">設定</button>
    <button onclick="location.href='send.html'">送信ボックス</button>
    <button id="logoutBtn">ログアウト</button>

    <h3>お知らせ（ブログ）</h3>
    <div id="blogList"></div>

    <h3>返却ボックス</h3>
    <div id="returnBox"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxjhCAmP1wXOfDbcRcPLsQEK0RJdwpz_peyAIkQHGFxSz_rDj9NQNcsuM8b_NqkHf1ebw/exec";

        function fixPdfUrl(url) {
            if (!url.toLowerCase().endsWith(".pdf")) return url;
            return url.replace(/\/image\/upload\/[^/]*\//, "/raw/upload/");
        }

        const user = JSON.parse(sessionStorage.getItem("loginUser"));
        if (!user) location.href = "index.html";

        document.getElementById("userInfo").innerHTML = `
                <p><strong>${user.name}</strong> さん</p>
                <p>ID：${user.id}</p>
            `;

        if (user.bgColor) {
            document.body.style.background = user.bgColor;
        }

        if (user.role === "admin") {
            const btn = document.createElement("button");
            btn.textContent = "管理者ページへ";
            btn.onclick = () => location.href = "kanrimypage.html";
            document.body.insertBefore(btn, document.getElementById("logoutBtn"));
        }

        function linkify(text) {
            const urlPattern = /(https?:\/\/[^\s]+)|(www\.[^\s]+)/g;
            return text.replace(urlPattern, url => {
                let href = url;
                if (!href.startsWith("http")) href = "http://" + href;
                return `<a href="${href}" target="_blank">${url}</a>`;
            });
        }

        fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({ action: "getBlogList" })
        })
            .then(res => res.json())
            .then(list => {
                const area = document.getElementById("blogList");
                area.innerHTML = "";

                list.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "blog-box";

                    const fileLinks = (item.files && item.files.length > 0)
                        ? item.files.map(f => {
                            const fixedUrl = fixPdfUrl(f.url);
                            return `<a class="file-link" href="${fixedUrl}" target="_blank">📎 ${f.filename}</a>`;
                        }).join("")
                        : "（添付なし）";

                    div.innerHTML = `
                            <strong>${item.title}</strong><br>
                            <p>${linkify(item.content)}</p>
                            <small>${item.time}</small><br>
                            <small>対象：${item.target === "ALL" ? "全員" : item.target}</small><br><br>
                            <strong>添付ファイル：</strong><br>
                            ${fileLinks}<br><br>
                            <button onclick="replyBlog('${item.index}')">返信する</button>
                        `;
                    area.appendChild(div);
                });
            });

        function replyBlog(index) {
            sessionStorage.setItem("replyBlogIndex", index);
            location.href = "reply.html";
        }

        fetch(API_URL, {
            method: "POST",
            body: new URLSearchParams({
                action: "getReturnBox",
                id: user.id
            })
        })
            .then(res => res.json())
            .then(list => {
                const area = document.getElementById("returnBox");
                area.innerHTML = "";

                if (!list || list.length === 0) {
                    area.textContent = "返却はまだありません。";
                    return;
                }

                list.forEach(item => {
                    const div = document.createElement("div");
                    div.className = "return-box";

                    const userFile = item.user_to_admin
                        ? `<a class="file-link" href="${fixPdfUrl(item.user_to_admin)}" target="_blank">📎 あなたの送信ファイル</a>`
                        : "なし";

                    const adminFile = item.admin_to_user
                        ? `<a class="file-link" href="${fixPdfUrl(item.admin_to_user)}" target="_blank">📎 ${item.admin_filename}</a>`
                        : "（まだ返却されていません）";

                    div.innerHTML = `
                            <div class="return-title">あなたの送信：</div>
                            ${userFile}
                            <small>${item.updated_at}</small><br>
                            <small>コメント：${item.comment || "なし"}</small>

                            <div class="return-title" style="margin-top:10px;">管理者からの返却：</div>
                            ${adminFile}
                            ${item.admin_time ? `<br><small>${item.admin_time}</small>` : ""}
                        `;

                    area.appendChild(div);
                });
            });

        document.getElementById("logoutBtn").addEventListener("click", () => {
            sessionStorage.removeItem("loginUser");
            location.href = "index.html";
        });
    </script>

</body>
</html>
